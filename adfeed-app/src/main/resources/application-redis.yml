spring:
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:  # если требуется
      timeout: 200ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      health-check:
        interval: 5000
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 минут в миллисекундах (значение по умолчанию)
      cache-null-values: false
      key-prefix: "adfeed:"
      use-key-prefix: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      redis:
        enabled: true

logging:
  level:
    de.codecentric.boot.admin.client: DEBUG
    com.example.app: DEBUG
    com.example.app.client: DEBUG
    org.springframework.cache: TRACE
    feign: DEBUG
    org.springframework.data.redis: DEBUG