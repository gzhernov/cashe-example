# docker-compose.yml
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: adfeed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      - REDIS_PASSWORD=  # установите пароль если нужно
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adfeed-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: adfeed-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8085:8081"
    depends_on:
      - redis
    networks:
      - adfeed-network

networks:
  adfeed-network:
    driver: bridge

volumes:
  redis-data:
    driver: local